<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScienceFair — Booth System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --y1: #FFE000;
  --y2: #FFD000;
  --y3: #FFC000;
  --g1: #1A7A3C;
  --g2: #22A050;
  --g3: #2ECC6A;
  --g4: #D6F5E3;
  --dark: #0D1F15;
  --dark2: #162B1E;
  --dark3: #1E3828;
  --card: #ffffff;
  --card2: #F5FBF7;
  --text: #0D1F15;
  --text2: #3A5A47;
  --text3: #6B8F7A;
  --border: #C8E8D4;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(13,31,21,0.10);
  --shadow-lg: 0 12px 48px rgba(13,31,21,0.16);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--dark2); }
::-webkit-scrollbar-thumb { background: var(--g1); border-radius: 3px; }

/* ── ANIMATED BG ── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}
#app { position: relative; z-index: 1; }

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.login-box {
  background: var(--dark2);
  border: 1px solid rgba(255,224,0,0.2);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%; max-width: 420px;
  box-shadow: 0 0 80px rgba(34,160,80,0.15), var(--shadow-lg);
  animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1);
}
.login-logo {
  text-align: center; margin-bottom: 36px;
}
.login-logo .atom {
  width: 64px; height: 64px;
  border: 3px solid var(--y1);
  border-radius: 50%;
  margin: 0 auto 12px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  animation: spin 8s linear infinite;
}
.login-logo .atom::before, .login-logo .atom::after {
  content: '';
  position: absolute;
  width: 100%; height: 100%;
  border: 2px solid var(--g2);
  border-radius: 50%;
}
.login-logo .atom::before { transform: rotate(60deg); border-color: var(--g3); opacity: 0.6; }
.login-logo .atom::after  { transform: rotate(-60deg); border-color: var(--y2); opacity: 0.4; }
.atom-dot {
  width: 10px; height: 10px;
  background: var(--y1);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--y1);
}
.login-logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem; font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
}
.login-logo h1 span { color: var(--y1); }
.login-logo p { color: var(--text3); font-size: 0.85rem; margin-top: 4px; }
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 0.78rem; font-weight: 500;
  color: var(--g3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  padding: 13px 16px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  border-color: var(--y1);
  box-shadow: 0 0 0 3px rgba(255,224,0,0.12);
}
.field input::placeholder { color: rgba(255,255,255,0.25); }
.btn-login {
  width: 100%;
  background: var(--y1);
  color: var(--dark);
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px;
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem; font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  letter-spacing: 0.03em;
}
.btn-login:hover { background: var(--y2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,224,0,0.3); }
.btn-login:active { transform: translateY(0); }
.login-error {
  background: rgba(220,53,69,0.15);
  border: 1px solid rgba(220,53,69,0.3);
  color: #ff6b6b;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 0.85rem;
  margin-top: 12px;
  display: none;
}

/* ══════════════════════════════════════
   CHANGE PASSWORD MODAL
══════════════════════════════════════ */
#pw-modal {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(13,31,21,0.92);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
  backdrop-filter: blur(6px);
}
#pw-modal.active { display: flex; }
.pw-box {
  background: var(--dark2);
  border: 1px solid var(--y1);
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%; max-width: 380px;
  box-shadow: 0 0 60px rgba(255,224,0,0.15);
}
.pw-box h2 {
  font-family: 'Syne', sans-serif;
  color: var(--y1); font-size: 1.3rem; margin-bottom: 8px;
}
.pw-box p { color: rgba(255,255,255,0.6); font-size: 0.875rem; margin-bottom: 24px; }

/* ══════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════ */
#main-app { display: none; min-height: 100vh; }
#main-app.active { display: flex; flex-direction: column; }

/* ── TOP NAV ── */
.topnav {
  background: var(--dark2);
  border-bottom: 1px solid rgba(255,224,0,0.15);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.topnav-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1.1rem;
  color: #fff; display: flex; align-items: center; gap: 8px;
}
.topnav-logo span { color: var(--y1); }
.nav-dot {
  width: 8px; height: 8px;
  background: var(--g3);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--g3);
  animation: pulse 2s ease-in-out infinite;
}
.topnav-right { display: flex; align-items: center; gap: 12px; }
.user-chip {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 99px;
  padding: 5px 12px 5px 5px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.user-chip:hover { border-color: var(--y1); }
.user-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--y1), var(--g2));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem; font-weight: 700;
  color: var(--dark);
}
.user-chip-name {
  font-size: 0.82rem; color: #fff; max-width: 120px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.role-badge {
  font-size: 0.65rem; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.role-learner { background: rgba(46,204,106,0.2); color: var(--g3); }
.role-admin   { background: rgba(255,224,0,0.2);  color: var(--y1); }
.role-teacher { background: rgba(100,149,237,0.2); color: #88AAFF; }
.role-booth   { background: rgba(255,120,50,0.2);  color: #FF9060; }
.btn-logout {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { border-color: #ff6b6b; color: #ff6b6b; }

/* ── ANNOUNCEMENT BANNER ── */
#announcement-banner {
  background: linear-gradient(90deg, var(--g1), var(--g2));
  color: #fff;
  padding: 10px 24px;
  font-size: 0.875rem;
  display: none; align-items: center; justify-content: space-between; gap: 12px;
  border-bottom: 2px solid var(--y1);
}
#announcement-banner.active { display: flex; }
.ann-icon { font-size: 1.1rem; flex-shrink: 0; }
.ann-close {
  background: transparent; border: none;
  color: rgba(255,255,255,0.7); cursor: pointer;
  font-size: 1.1rem; flex-shrink: 0;
  transition: color 0.2s;
}
.ann-close:hover { color: #fff; }

/* ── CONTENT AREA ── */
.content-area { flex: 1; padding: 24px; max-width: 960px; margin: 0 auto; width: 100%; }

/* ── TAB NAV ── */
.tab-nav {
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1; min-width: max-content;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.45);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 500;
  padding: 9px 14px;
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }
.tab-btn.active {
  background: var(--y1);
  color: var(--dark);
  font-weight: 700;
}
.tab-panel { display: none; animation: fadeIn 0.3s ease; }
.tab-panel.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 16px;
}
.card-yellow {
  border-color: rgba(255,224,0,0.3);
  background: linear-gradient(135deg, var(--dark2), rgba(255,224,0,0.04));
}
.card-green {
  border-color: rgba(34,160,80,0.3);
  background: linear-gradient(135deg, var(--dark2), rgba(34,160,80,0.04));
}
.card h3 {
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem; font-weight: 700;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 4px;
}
.card .big-num {
  font-family: 'Syne', sans-serif;
  font-size: 2.8rem; font-weight: 800;
  color: var(--y1);
  line-height: 1;
}
.card .card-sub { color: rgba(255,255,255,0.35); font-size: 0.8rem; margin-top: 4px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }

/* ── GREETING ── */
.greeting {
  margin-bottom: 24px;
  padding: 28px 28px 28px 32px;
  background: linear-gradient(135deg, var(--dark3), var(--dark2));
  border: 1px solid rgba(255,224,0,0.2);
  border-left: 4px solid var(--y1);
  border-radius: var(--radius);
  position: relative; overflow: hidden;
}
.greeting::after {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,224,0,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.greeting h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem; font-weight: 800;
  color: #fff; margin-bottom: 4px;
}
.greeting h2 span { color: var(--y1); }
.greeting p { color: rgba(255,255,255,0.5); font-size: 0.875rem; }
.greeting .grade-tag {
  display: inline-block; margin-top: 10px;
  background: rgba(46,204,106,0.15);
  border: 1px solid rgba(46,204,106,0.3);
  color: var(--g3); border-radius: 99px;
  padding: 4px 12px; font-size: 0.78rem; font-weight: 500;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: none; border-radius: var(--radius-sm);
  padding: 10px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  text-decoration: none;
}
.btn-primary { background: var(--y1); color: var(--dark); font-weight: 700; }
.btn-primary:hover { background: var(--y2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,224,0,0.25); }
.btn-green { background: var(--g2); color: #fff; font-weight: 600; }
.btn-green:hover { background: var(--g1); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
}
.btn-ghost:hover { border-color: var(--y1); color: var(--y1); }
.btn-danger { background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.3); color: #ff6b6b; }
.btn-danger:hover { background: rgba(220,53,69,0.25); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; }
.btn-block { width: 100%; justify-content: center; }

/* ── FORM ELEMENTS ── */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 0.78rem; font-weight: 500;
  color: var(--g3); letter-spacing: 0.06em;
  text-transform: uppercase; margin-bottom: 6px;
}
.form-control {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: none;
}
.form-control:focus { border-color: var(--y1); box-shadow: 0 0 0 3px rgba(255,224,0,0.1); }
.form-control option { background: var(--dark2); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 80px; }

/* ── SECTION TITLE ── */
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  color: #fff; margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after {
  content: ''; flex: 1;
  height: 1px; background: rgba(255,255,255,0.08);
}
.section-icon {
  width: 28px; height: 28px;
  background: var(--y1);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  color: var(--dark);
}

/* ── ACTIVITY LOG ── */
.activity-list { display: flex; flex-direction: column; gap: 8px; }
.activity-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  transition: border-color 0.2s;
}
.activity-item:hover { border-color: rgba(255,224,0,0.15); }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; margin-top: 5px;
}
.dot-play   { background: var(--y1); box-shadow: 0 0 8px rgba(255,224,0,0.5); }
.dot-send   { background: var(--g3); box-shadow: 0 0 8px rgba(46,204,106,0.5); }
.dot-deploy { background: #88AAFF; box-shadow: 0 0 8px rgba(136,170,255,0.5); }
.dot-refund { background: #ff6b6b; box-shadow: 0 0 8px rgba(255,107,107,0.5); }
.activity-text { flex: 1; }
.activity-text .at-main { font-size: 0.875rem; color: rgba(255,255,255,0.85); }
.activity-text .at-time { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 2px; }
.activity-tickets {
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem; font-weight: 700;
  color: var(--y1); flex-shrink: 0;
}

/* ── BOOTH GRID (Play a Booth) ── */
.booth-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.booth-card {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer; text-align: center;
  transition: all 0.2s;
  position: relative; overflow: hidden;
}
.booth-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,224,0,0.05), rgba(34,160,80,0.05));
  opacity: 0; transition: opacity 0.2s;
}
.booth-card:hover { border-color: var(--y1); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255,224,0,0.15); }
.booth-card:hover::before { opacity: 1; }
.booth-card.selected { border-color: var(--g2); background: rgba(34,160,80,0.08); }
.booth-card.selected::before { opacity: 1; }
.booth-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--y1), var(--g2));
  border-radius: 12px;
  margin: 0 auto 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
}
.booth-card-name { font-family: 'Syne', sans-serif; font-size: 0.875rem; font-weight: 700; color: #fff; }

/* ── TICKET PICKER ── */
.ticket-picker {
  background: rgba(255,224,0,0.05);
  border: 1px solid rgba(255,224,0,0.2);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.ticket-picker h4 {
  font-family: 'Syne', sans-serif;
  color: var(--y1); font-size: 0.875rem;
  margin-bottom: 14px;
}
.ticket-row { display: flex; align-items: center; gap: 12px; }
.ticket-count-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff; border-radius: 50%;
  font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.ticket-count-btn:hover { background: var(--y1); color: var(--dark); border-color: var(--y1); }
.ticket-num {
  font-family: 'Syne', sans-serif;
  font-size: 1.8rem; font-weight: 800;
  color: #fff; min-width: 48px; text-align: center;
}
.ticket-input { width: 80px !important; text-align: center; font-size: 1.1rem !important; }

/* ── POINTS TABLE ── */
.points-table { width: 100%; border-collapse: collapse; }
.points-table th {
  text-align: left; padding: 10px 14px;
  font-size: 0.75rem; font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.06em; text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.points-table td {
  padding: 12px 14px;
  font-size: 0.875rem;
  color: rgba(255,255,255,0.8);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.points-table tr:hover td { background: rgba(255,224,0,0.04); }
.points-table td:last-child { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--y1); }
.total-row td { color: #fff !important; font-weight: 600; border-top: 1px solid rgba(255,255,255,0.1); }

/* ── TRANSACTIONS TABLE ── */
.txn-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.txn-table th {
  padding: 9px 12px; text-align: left;
  font-size: 0.72rem; font-weight: 700;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.05em; text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.txn-table td {
  padding: 10px 12px;
  color: rgba(255,255,255,0.75);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
.txn-table tr:hover td { background: rgba(255,255,255,0.02); }
.txn-type-badge {
  display: inline-block;
  padding: 2px 8px; border-radius: 99px;
  font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase;
}
.type-play   { background: rgba(255,224,0,0.15);  color: var(--y1); }
.type-send   { background: rgba(46,204,106,0.15); color: var(--g3); }
.type-deploy { background: rgba(136,170,255,0.15); color: #88AAFF; }
.type-refund { background: rgba(255,107,107,0.15); color: #ff6b6b; }
.refunded-row td { opacity: 0.4; text-decoration: line-through; }
.refunded-row td:last-child { text-decoration: none; }

/* ── LEADERBOARD ── */

<script>
// ══════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzuYgcNQ3Qg5XytMxx76apORo0dos1eYNN-B1648PJ1ZcmBQh9RAhAY7Tz-MJiXBnMAIg/exec';

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let SESSION = null;
let pollInterval = null;
let confirmCallback = null;
let notifHistory = [];
let dismissedAnn = null;

// ══════════════════════════════════════════════════
//  ANIMATED BACKGROUND
// ══════════════════════════════════════════════════
(function initBg() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const COLORS = ['rgba(255,224,0,', 'rgba(34,160,80,', 'rgba(46,204,106,'];
  for (let i = 0; i < 55; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 2.5 + 0.5,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      a: Math.random() * 0.4 + 0.1,
      c: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.c + p.a + ')';
      ctx.fill();
    });
    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(34,160,80,${0.08 * (1 - dist/120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ══════════════════════════════════════════════════
//  API HELPER
// ══════════════════════════════════════════════════
// API caller — uses GET with URL params
// Apps Script's ContentService supports cross-origin GET requests
let _cbCount = 0;
async function api(action, params = {}, silent = false) {
  if (!silent) showSpinner();
  try {
    const payload = { action, params };
    if (SESSION && SESSION.token) payload.token = SESSION.token;

    // Use fetch GET — Apps Script ContentService allows this cross-origin
    const url = API_URL + '?payload=' + encodeURIComponent(JSON.stringify(payload));
    
    let res;
    try {
      res = await fetch(url, {
        method: 'GET',
        redirect: 'follow',
        credentials: 'omit',
        headers: { 'Accept': 'application/json, text/plain, */*' }
      });
    } catch(fetchErr) {
      throw new Error('Network error: ' + fetchErr.message + '. Check if Apps Script URL is correct and deployed as "Anyone" access.');
    }

    const text = await res.text();
    if (!text || text.trim() === '') {
      throw new Error('Empty response from server. Re-deploy your Apps Script as a new version.');
    }

    // Apps Script sometimes wraps in HTML on error
    if (text.trim().startsWith('<')) {
      throw new Error('Got HTML instead of JSON. Your deployment settings are wrong. Set "Execute as: Me" and "Who has access: Anyone".');
    }

    let json;
    try { json = JSON.parse(text); }
    catch(e) { throw new Error('Invalid JSON from server: ' + text.slice(0, 150)); }

    if (!json.success) throw new Error(json.error || 'Server returned an error.');
    return json.data;
  } finally {
    if (!silent) hideSpinner();
  }
}

// ══════════════════════════════════════════════════
//  SPINNER / TOAST
// ══════════════════════════════════════════════════
function showSpinner() { document.getElementById('spinner').classList.add('active'); }
function hideSpinner() { document.getElementById('spinner').classList.remove('active'); }

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + (type === 'error' ? 'error' : type === 'warning' ? 'warning' : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.classList.add('removing');
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

function showConfirm(title, msg, cb, btnLabel = 'Confirm', danger = false) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  const okBtn = document.getElementById('confirm-ok-btn');
  okBtn.textContent = btnLabel;
  okBtn.className = 'btn ' + (danger ? 'btn-danger' : 'btn-primary');
  confirmCallback = cb;
  document.getElementById('confirm-modal').classList.add('active');
}
function closeConfirm() { document.getElementById('confirm-modal').classList.remove('active'); confirmCallback = null; }
function confirmOk() { closeConfirm(); if (confirmCallback) confirmCallback(); }

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent = 'Please enter username and password.'; errEl.style.display = 'block'; return; }
  try {
    const data = await api('login', { username, password });
    SESSION = data;
    localStorage.setItem('sf_session', JSON.stringify(data));
    if (data.must_change_pw === true || data.must_change_pw === 'TRUE') {
      document.getElementById('pw-modal').classList.add('active');
    } else {
      enterApp();
    }
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

async function submitChangePw() {
  const p1 = document.getElementById('new-pw1').value;
  const p2 = document.getElementById('new-pw2').value;
  if (!p1 || p1.length < 6) { toast('Password must be at least 6 characters.', 'error'); return; }
  if (p1 !== p2) { toast('Passwords do not match.', 'error'); return; }
  try {
    await api('changePassword', { newPassword: p1 });
    document.getElementById('pw-modal').classList.remove('active');
    toast('Password set successfully!');
    enterApp();
  } catch (e) { toast(e.message, 'error'); }
}

async function doLogout() {
  try { await api('logout', {}, true); } catch(_) {}
  localStorage.removeItem('sf_session');
  SESSION = null;
  clearInterval(pollInterval);
  document.getElementById('main-app').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

//  ENTER APP
// ══════════════════════════════════════════════════
function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').classList.add('active');
  // Nav
  const initials = SESSION.full_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-name').textContent   = SESSION.full_name;
  const rb = document.getElementById('nav-role-badge');
  rb.textContent  = SESSION.role.charAt(0).toUpperCase() + SESSION.role.slice(1);
  rb.className    = 'role-badge role-' + SESSION.role;
  // Render role UI
  const rc = document.getElementById('role-content');
  if      (SESSION.role === 'learner')  rc.innerHTML = buildLearnerUI();
  else if (SESSION.role === 'admin')    rc.innerHTML = buildAdminUI();
  else if (SESSION.role === 'teacher')  rc.innerHTML = buildTeacherUI();
  else if (SESSION.role === 'booth')    rc.innerHTML = buildBoothUI();
  // Activate first tab
  switchTab(SESSION.role + '-tab-0');
  // Load initial data
  loadRoleData();
  // Start polling every 5s
  pollInterval = setInterval(doPoll, 5000);
  doPoll();
}

// ══════════════════════════════════════════════════
//  POLLING
// ══════════════════════════════════════════════════
async function doPoll() {
  try {
    const notifs = await api('pollNotifications', {}, true);
    if (notifs && notifs.length) {
      notifs.forEach(n => {
        notifHistory.unshift(n);
        toast('🔔 ' + n.message);
      });
      renderNotifDropdown();
      updateNotifBadge(notifHistory.filter(n=>!n._read).length);
    }
    const ann = await api('getAnnouncement', {}, true);
    if (ann && ann.message !== dismissedAnn) {
      document.getElementById('ann-text').textContent = ann.message;
      document.getElementById('announcement-banner').classList.add('active');
    } else if (!ann) {
      document.getElementById('announcement-banner').classList.remove('active');
    }
  } catch(_) {}
}

function dismissAnnouncement() {
  dismissedAnn = document.getElementById('ann-text').textContent;
  document.getElementById('announcement-banner').classList.remove('active');
}

function updateNotifBadge(count) {
  const el = document.getElementById('notif-count');
  if (count > 0) { el.textContent = count > 9 ? '9+' : count; el.classList.add('visible'); }
  else el.classList.remove('visible');
}

function toggleNotif() {
  const dd = document.getElementById('notif-dropdown');
  dd.classList.toggle('open');
  if (dd.classList.contains('open')) {
    notifHistory.forEach(n => n._read = true);
    updateNotifBadge(0);
    renderNotifDropdown();
  }
}
document.addEventListener('click', e => {
  if (!e.target.closest('#notif-bell-btn') && !e.target.closest('#notif-dropdown'))
    document.getElementById('notif-dropdown').classList.remove('open');
});

function renderNotifDropdown() {
  const el = document.getElementById('notif-list');
  if (!notifHistory.length) { el.innerHTML = '<div class="notif-empty">No notifications yet</div>'; return; }
  el.innerHTML = notifHistory.slice(0,12).map(n => `
    <div class="notif-item">
      ${escHtml(n.message)}
      <div class="notif-time">${fmtTime(n.created_at)}</div>
    </div>`).join('');
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const btn = document.querySelector(`[data-tab="${tabId}"]`);
  const pan = document.getElementById(tabId);
  if (btn) btn.classList.add('active');
  if (pan) pan.classList.add('active');
}

function renderActivityLog(log, myId) {
  if (!log.length) return '<div class="empty-state"><div class="es-icon">📭</div><p>No activity yet</p></div>';
  return log.map(t => {
    const isFrom = String(t.from_account_id) === String(myId);
    const dotClass = { play_booth:'dot-play', send_student:'dot-send', deploy:'dot-deploy', refund:'dot-refund' }[t.txn_type] || 'dot-deploy';
    const labels = { play_booth: isFrom ? `Played at a booth` : `Received play`, send_student: isFrom ? 'Sent ticket to student' : 'Received ticket from student', deploy: 'Received from Admin', refund: 'Refund processed' };
    const sign = (t.txn_type==='deploy'||(!isFrom&&t.txn_type==='send_student')||t.txn_type==='refund') ? '+' : '-';
    return `<div class="activity-item${t.refunded===true||t.refunded==='TRUE'?' refunded-row':''}">
      <div class="activity-dot ${dotClass}"></div>
      <div class="activity-text">
        <div class="at-main">${labels[t.txn_type]||t.txn_type} ${t.refunded===true||t.refunded==='TRUE'?' (refunded)':''}</div>
        <div class="at-time">Day ${t.day} · ${fmtTime(t.timestamp)}</div>
      </div>
      <div class="activity-tickets">${sign}${t.tickets}</div>
    </div>`;
  }).join('');
}

function selectBooth(id, name) {
  selectedBoothId = id; selectedBoothName = name;
  document.querySelectorAll('.booth-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('bcard-' + id).classList.add('selected');
  document.getElementById('selected-booth-name').textContent = name;
  document.getElementById('play-picker').classList.remove('hidden');
  playTickets = 1; document.getElementById('ticket-val').textContent = 1;

function clearBoothSelection() {
  selectedBoothId = null;
  document.querySelectorAll('.booth-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('play-picker').classList.add('hidden');
}
function adjustTickets(d) {
  playTickets = Math.max(1, playTickets + d);
  document.getElementById('ticket-val').textContent = playTickets;

function adjustSendTickets(d) {
  sendTickets = Math.max(1, sendTickets + d);

function confirmPlayBooth() {

    async () => {
      try {
        const r = await api('playBooth', { boothId: selectedBoothId, tickets: playTickets });
        SESSION.ticket_balance = r.new_balance;
        updateBalanceDisplays(r.new_balance);
        toast('🎮 ' + r.message);
        clearBoothSelection();
        await loadLearnerDashboard();

    }, 'Send Tickets');

        ${faqs.length ? faqs.map(f=>`
          <div class="faq-item" onclick="toggleFAQ(this)">
            <div class="faq-q">${escHtml(f.question)}<span class="faq-arrow">▼</span></div>
            <div class="faq-a">${escHtml(f.answer)}
              ${adminEdit?`<div style="margin-top:10px"><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteFAQ('${f.faq_id}')">Delete</button></div>`:''}
            </div>
          </div>`).join('') : '<div class="empty-state"><div class="es-icon">❓</div><p>No FAQs yet</p></div>'}
      </div>`;
  } catch(e) {}
}
function toggleFAQ(el) { el.classList.toggle('open'); }
async function addFAQ() {
  const q=document.getElementById('faq-q')?.value.trim(); const a=document.getElementById('faq-a')?.value.trim();
  if(!q||!a){toast('Enter question and answer.','warning');return;}
  try{await api('manageFAQ',{subaction:'add',data:{question:q,answer:a}});toast('FAQ added.');loadFAQs(true);}catch(e){toast(e.message,'error');}
}
async function deleteFAQ(faqId) {
  showConfirm('Delete FAQ','Remove this FAQ?',async()=>{
    try{await api('manageFAQ',{subaction:'delete',data:{faq_id:faqId}});toast('FAQ removed.');loadFAQs(true);}catch(e){toast(e.message,'error');}
  },'Delete',true);
}

async function loadCredits(adminEdit = false) {
  const credTabId = SESSION.role==='learner'?'learner-tab-5':SESSION.role==='admin'?'admin-tab-8':SESSION.role==='teacher'?'teacher-tab-2':'booth-tab-3';
  const pan = document.getElementById(credTabId);
  if (!pan) return;
  try {
    const grouped = await api('getCredits',{},true);
    const cats = Object.keys(grouped);
    pan.innerHTML = `
      <div class="section-title"><span class="section-icon">⭐</span>Credits</div>
      ${adminEdit?`<div class="card mb-16">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group"><label>Name</label><input class="form-control" id="cr-name" placeholder="Full Name"></div>
          <div class="form-group"><label>Role</label><input class="form-control" id="cr-role" placeholder="e.g. Lead Developer"></div>
          <div class="form-group" style="grid-column:1/-1"><label>Category</label><input class="form-control" id="cr-cat" placeholder="e.g. Developers"></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="addCredit()">+ Add</button>
      </div>`:''}
      ${cats.length ? cats.map(cat=>`
        <div class="credits-section">
          <h3>${escHtml(cat)}</h3>
          <div class="credits-grid">
            ${grouped[cat].map(c=>`
              <div class="credit-card">
                <div class="credit-name">${escHtml(c.name)}</div>
                <div class="credit-role">${escHtml(c.role_label)}</div>
              </div>`).join('')}
          </div>
        </div>`).join('') : '<div class="empty-state"><div class="es-icon">⭐</div><p>No credits yet</p></div>'}`;
  } catch(e) {}
}
async function addCredit() {
  const n=document.getElementById('cr-name')?.value.trim(); const r=document.getElementById('cr-role')?.value.trim(); const c=document.getElementById('cr-cat')?.value.trim();
  if(!n||!r||!c){toast('All fields required.','warning');return;}
  try{await api('manageCredits',{subaction:'add',data:{name:n,role_label:r,category:c}});toast('Credit added.');loadCredits(true);}catch(e){toast(e.message,'error');}
}

async function loadLeaderboard() {
  const tabId = SESSION.role==='booth'?'booth-tab-1':null;
  if (!tabId) return;
  const pan = document.getElementById(tabId);
  if (!pan) return;
  try {
    const boards = await api('getLeaderboard',{},true);
    pan.innerHTML = `
      <div class="section-title"><span class="section-icon">🏆</span>Live Leaderboard</div>
      <div class="leaderboard-list">
        ${boards.length ? boards.map((b,i)=>`
          <div class="lb-item rank-${i+1}">
            <div class="lb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
            <div class="lb-name">${escHtml(b.alias)}</div>
            <div class="lb-days">
              ${[1,2,3,4].map(d=>`<div class="lb-day"><span>D${d}</span><strong>${b['day'+d]||0}</strong></div>`).join('')}
            </div>
            <div class="lb-total">${b.total}</div>
          </div>`).join('') : '<div class="empty-state"><div class="es-icon">🏆</div><p>Leaderboard not yet released</p></div>'}
      </div>`;
  } catch(e) {}
}

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-PH',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
  } catch(_) { return String(iso).slice(0,16); }
}

//  AUTO-LOGIN (if session stored)
// ══════════════════════════════════════════════════
(async function checkSavedSession() {
  const saved = localStorage.getItem('sf_session');
  if (!saved) return;
  try {
    SESSION = JSON.parse(saved);
    const valid = await api('validateSession',{},true);
    if (valid) { SESSION = { ...SESSION, ...valid }; enterApp(); }
    else { localStorage.removeItem('sf_session'); SESSION = null; }
  } catch(_) { localStorage.removeItem('sf_session'); SESSION = null; }
})();
</script>
