<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Fair Booth System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--y:#FFE000;--g:#22A050;--g2:#2ECC6A;--dk:#0D1F15;--dk2:#162B1E;--dk3:#1E3828;--rd:#ff6b6b;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dk);color:#fff;min-height:100vh}
input,select,textarea,button{font-family:inherit}
.hidden{display:none!important}

/* SPINNER */
#spin{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:none;align-items:center;justify-content:center}
#spin.on{display:flex}
.ring{width:44px;height:44px;border:3px solid rgba(255,224,0,.2);border-top-color:var(--y);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toasts{position:fixed;top:70px;right:16px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--dk2);border-left:4px solid var(--g);padding:12px 16px;border-radius:10px;font-size:.875rem;max-width:320px;animation:slideIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.err{border-left-color:var(--rd)}
.toast.warn{border-left-color:var(--y)}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}

/* CONFIRM */
#confirm{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9997;display:none;align-items:center;justify-content:center;padding:16px}
#confirm.on{display:flex}
.cbox{background:var(--dk2);border:1px solid rgba(255,224,0,.3);border-radius:18px;padding:28px;max-width:380px;width:100%}
.cbox h3{font-family:Syne;font-size:1.1rem;margin-bottom:8px}
.cbox p{color:rgba(255,255,255,.55);font-size:.875rem;margin-bottom:20px;line-height:1.6}
.cbox-btns{display:flex;gap:10px;justify-content:flex-end}

/* CHANGE PW MODAL */
#pwmodal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9996;display:none;align-items:center;justify-content:center;padding:16px}
#pwmodal.on{display:flex}
.pwbox{background:var(--dk2);border:1px solid var(--y);border-radius:18px;padding:32px;max-width:360px;width:100%}
.pwbox h2{font-family:Syne;color:var(--y);font-size:1.2rem;margin-bottom:6px}
.pwbox p{color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:20px}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lbox{background:var(--dk2);border:1px solid rgba(255,224,0,.2);border-radius:22px;padding:40px;width:100%;max-width:400px;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-family:Syne;font-size:1.6rem;font-weight:800}
.logo h1 span{color:var(--y)}
.logo p{color:rgba(255,255,255,.4);font-size:.82rem;margin-top:4px}
.atom{width:56px;height:56px;border:2.5px solid var(--y);border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;animation:spin 8s linear infinite;position:relative}
.atom::before,.atom::after{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--g);transform:rotate(60deg)}
.atom::after{transform:rotate(-60deg);border-color:rgba(255,224,0,.4)}
.dot{width:8px;height:8px;background:var(--y);border-radius:50%;box-shadow:0 0 10px var(--y)}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:.75rem;font-weight:500;color:var(--g2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:#fff;font-size:.9rem;outline:none;transition:.2s}
.inp:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(255,224,0,.1)}
.inp option{background:var(--dk2)}
.lerr{background:rgba(220,53,69,.15);border:1px solid rgba(220,53,69,.3);color:var(--rd);border-radius:10px;padding:10px 14px;font-size:.83rem;margin-top:10px;display:none}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:10px 18px;font-size:.875rem;font-weight:500;cursor:pointer;transition:.2s;text-decoration:none}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-y{background:var(--y);color:var(--dk);font-weight:700}
.btn-y:hover{background:#FFD000;transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,224,0,.25)}
.btn-g{background:var(--g);color:#fff;font-weight:600}
.btn-g:hover{background:#1a7a3c;transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.btn-ghost:hover{border-color:var(--y);color:var(--y)}
.btn-danger{background:rgba(220,53,69,.15);border:1px solid rgba(220,53,69,.3);color:var(--rd)}
.btn-danger:hover{background:rgba(220,53,69,.25)}
.btn-sm{padding:6px 12px;font-size:.78rem}
.btn-block{width:100%;justify-content:center}

/* NAV */
#nav{background:var(--dk2);border-bottom:1px solid rgba(255,224,0,.12);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Syne;font-weight:800;font-size:1rem;display:flex;align-items:center;gap:8px}
.nav-logo span{color:var(--y)}
.navdot{width:7px;height:7px;background:var(--g2);border-radius:50%;box-shadow:0 0 7px var(--g2);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-r{display:flex;align-items:center;gap:10px}
.chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:99px;padding:4px 12px 4px 4px}
.av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--y),var(--g));display:flex;align-items:center;justify-content:center;font-family:Syne;font-size:.68rem;font-weight:700;color:var(--dk)}
.chip-name{font-size:.8rem;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbadge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase}
.rb-learner{background:rgba(46,204,106,.2);color:var(--g2)}
.rb-admin{background:rgba(255,224,0,.2);color:var(--y)}
.rb-teacher{background:rgba(136,170,255,.2);color:#88AAFF}
.rb-booth{background:rgba(255,120,50,.2);color:#FF9060}
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.45);border-radius:8px;padding:5px 12px;font-size:.78rem;cursor:pointer;transition:.2s}
.logout-btn:hover{border-color:var(--rd);color:var(--rd)}

/* NOTIFICATION BELL */
.bell-wrap{position:relative}
.bell-btn{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;transition:.2s}
.bell-btn:hover{border-color:var(--y);color:var(--y)}
.bell-badge{position:absolute;top:-3px;right:-3px;background:var(--y);color:var(--dk);font-family:Syne;font-size:.58rem;font-weight:800;width:15px;height:15px;border-radius:50%;display:none;align-items:center;justify-content:center}
.bell-badge.on{display:flex}
.notif-dd{position:absolute;top:42px;right:0;width:300px;max-height:360px;overflow-y:auto;background:var(--dk2);border:1px solid rgba(255,224,0,.2);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);display:none;z-index:200}
.notif-dd.on{display:block}
.ndd-hdr{padding:12px 14px 8px;font-family:Syne;font-size:.78rem;font-weight:700;color:var(--y);border-bottom:1px solid rgba(255,255,255,.06)}
.ndd-item{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem;color:rgba(255,255,255,.75);line-height:1.5}
.ndd-item:last-child{border:none}
.ndd-time{font-size:.7rem;color:rgba(255,255,255,.3);margin-top:2px}
.ndd-empty{padding:20px;text-align:center;color:rgba(255,255,255,.25);font-size:.83rem}

/* ANN BANNER */
#ann{background:linear-gradient(90deg,var(--dk3),var(--dk2));border-bottom:2px solid var(--y);padding:9px 20px;display:none;align-items:center;gap:10px;font-size:.875rem}
#ann.on{display:flex}
#ann-close{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:1rem;margin-left:auto;transition:.2s}
#ann-close:hover{color:#fff}

/* MAIN CONTENT */
#app{display:none}
#app.on{display:block}
.wrap{max-width:940px;margin:0 auto;padding:20px}

/* TABS */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:3px;margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:max-content;background:none;border:none;color:rgba(255,255,255,.4);font-size:.8rem;font-weight:500;padding:8px 13px;border-radius:9px;cursor:pointer;transition:.2s;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.75)}
.tab.on{background:var(--y);color:var(--dk);font-weight:700}
.panel{display:none}
.panel.on{display:block;animation:fadeUp .25s ease}

/* CARDS */
.card{background:var(--dk2);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 22px;margin-bottom:14px}
.card-y{border-color:rgba(255,224,0,.25);background:linear-gradient(135deg,var(--dk2),rgba(255,224,0,.03))}
.card-g{border-color:rgba(34,160,80,.25);background:linear-gradient(135deg,var(--dk2),rgba(34,160,80,.03))}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin-bottom:18px}
.stat{background:var(--dk2);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px}
.stat-label{font-size:.72rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-val{font-family:Syne;font-size:2.2rem;font-weight:800;color:var(--y);line-height:1}
.stat-sub{font-size:.75rem;color:rgba(255,255,255,.3);margin-top:3px}

/* GREET */
.greet{background:linear-gradient(135deg,var(--dk3),var(--dk2));border:1px solid rgba(255,224,0,.18);border-left:4px solid var(--y);border-radius:14px;padding:22px 24px;margin-bottom:20px}
.greet h2{font-family:Syne;font-size:1.4rem;font-weight:800;margin-bottom:3px}
.greet h2 span{color:var(--y)}
.greet p{color:rgba(255,255,255,.45);font-size:.85rem}
.gtag{display:inline-block;background:rgba(46,204,106,.12);border:1px solid rgba(46,204,106,.25);color:var(--g2);border-radius:99px;padding:3px 11px;font-size:.75rem;font-weight:500;margin-top:8px}

/* SECTION TITLE */
.stitle{font-family:Syne;font-size:1rem;font-weight:700;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
.sicon{width:26px;height:26px;background:var(--y);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--dk)}

/* FORM */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.74rem;font-weight:500;color:var(--g2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.g2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.g2col{grid-template-columns:1fr}}

/* ACTIVITY */
.acts{display:flex;flex-direction:column;gap:7px}
.act{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px}
.act:hover{border-color:rgba(255,224,0,.12)}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.adot-play{background:var(--y);box-shadow:0 0 7px rgba(255,224,0,.5)}
.adot-send{background:var(--g2);box-shadow:0 0 7px rgba(46,204,106,.5)}
.adot-dep{background:#88AAFF;box-shadow:0 0 7px rgba(136,170,255,.5)}
.adot-ref{background:var(--rd);box-shadow:0 0 7px rgba(255,107,107,.5)}
.act-txt{flex:1;font-size:.85rem;color:rgba(255,255,255,.8)}
.act-sub{font-size:.73rem;color:rgba(255,255,255,.3);margin-top:2px}
.act-tk{font-family:Syne;font-size:.88rem;font-weight:700;color:var(--y);flex-shrink:0}

/* BOOTH GRID */
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:11px;margin-bottom:18px}
.bcrd{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 14px;cursor:pointer;text-align:center;transition:.2s}
.bcrd:hover{border-color:var(--y);transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,224,0,.12)}
.bcrd.sel{border-color:var(--g);background:rgba(34,160,80,.07)}
.bico{width:40px;height:40px;background:linear-gradient(135deg,var(--y),var(--g));border-radius:11px;margin:0 auto 9px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.bname{font-family:Syne;font-size:.82rem;font-weight:700;color:#fff}

/* TICKET PICKER */
.tpick{background:rgba(255,224,0,.05);border:1px solid rgba(255,224,0,.2);border-radius:14px;padding:18px;margin-bottom:14px}
.tpick h4{font-family:Syne;color:var(--y);font-size:.85rem;margin-bottom:12px}
.trow{display:flex;align-items:center;gap:11px}
.tcnt{width:34px;height:34px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.tcnt:hover{background:var(--y);color:var(--dk);border-color:var(--y)}
.tnum{font-family:Syne;font-size:1.8rem;font-weight:800;min-width:44px;text-align:center}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(255,255,255,.06)}
table{width:100%;border-collapse:collapse;min-width:560px}
th{text-align:left;padding:9px 13px;font-size:.7rem;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02)}
td{padding:10px 13px;font-size:.83rem;color:rgba(255,255,255,.75);border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.refunded-row td{opacity:.35;text-decoration:line-through}
.refunded-row td:last-child{text-decoration:none}
.typebadge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.68rem;font-weight:700;text-transform:uppercase}
.type-play{background:rgba(255,224,0,.15);color:var(--y)}
.type-send{background:rgba(46,204,106,.15);color:var(--g2)}
.type-deploy{background:rgba(136,170,255,.15);color:#88AAFF}
.type-refund{background:rgba(255,107,107,.15);color:var(--rd)}

/* BOOTH POINTS */
.bpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:11px}
.bpcrd{background:var(--dk2);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 18px;transition:.2s}
.bpcrd:hover{border-color:rgba(255,224,0,.2)}
.bpname{font-family:Syne;font-weight:700;font-size:.92rem;margin-bottom:2px}
.bpalias{font-size:.72rem;color:rgba(255,255,255,.3);margin-bottom:10px}
.bpdays{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.bpday{background:rgba(255,255,255,.04);border-radius:7px;padding:6px;text-align:center}
.bpday span{display:block;font-size:.62rem;color:rgba(255,255,255,.3)}
.bpday strong{font-family:Syne;font-size:.88rem}
.bptot{display:flex;align-items:center;justify-content:space-between}
.bptotnum{font-family:Syne;font-size:1.35rem;font-weight:800;color:var(--y)}
.bpacts{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}

/* DATA CARDS */
.dcgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px;margin-bottom:18px}
.dc{background:var(--dk2);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px}
.dc-lbl{font-size:.72rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.dc-val{font-family:Syne;font-size:1.5rem;font-weight:800;color:var(--y)}
.dc-sub{font-size:.75rem;color:rgba(255,255,255,.3);margin-top:3px}

/* FAQ */
.faq-list{display:flex;flex-direction:column;gap:7px}
.faq-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s}
.faq-item:hover,.faq-item.on{border-color:rgba(255,224,0,.25)}
.faq-q{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;font-size:.88rem;font-weight:500}
.faq-arr{font-size:.72rem;color:var(--y);transition:.2s}
.faq-item.on .faq-arr{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:.85rem;color:rgba(255,255,255,.55);line-height:1.7}
.faq-item.on .faq-a{max-height:300px;padding:0 15px 13px}

/* CREDITS */
.cr-sec{margin-bottom:24px}
.cr-sec h3{font-family:Syne;font-size:.72rem;font-weight:700;color:var(--y);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.cr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px}
.cr-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;transition:.2s}
.cr-card:hover{border-color:rgba(255,224,0,.18)}
.cr-name{font-weight:500;font-size:.85rem}
.cr-role{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:2px}

/* LEADERBOARD */
.lbList{display:flex;flex-direction:column;gap:9px}
.lbi{display:flex;align-items:center;gap:13px;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:13px;transition:.2s}
.lbi:hover{border-color:rgba(255,224,0,.18)}
.lbi.r1{border-color:rgba(255,224,0,.35);background:rgba(255,224,0,.05)}
.lbi.r2{border-color:rgba(192,192,192,.25)}
.lbi.r3{border-color:rgba(205,127,50,.25)}
.lbrank{font-family:Syne;font-size:1.15rem;font-weight:800;min-width:30px;text-align:center}
.r1 .lbrank{color:var(--y)}
.r2 .lbrank{color:#C0C0C0}
.r3 .lbrank{color:#CD7F32}
.lbname{flex:1;font-weight:500;font-size:.88rem}
.lbdays{display:flex;gap:7px}
.lbd{text-align:center}
.lbd span{display:block;font-size:.62rem;color:rgba(255,255,255,.3)}
.lbd strong{font-family:Syne;font-size:.78rem;color:rgba(255,255,255,.65)}
.lbtot{font-family:Syne;font-size:1.05rem;font-weight:800;color:var(--y)}

/* DAY TABS */
.dtabs{display:flex;gap:6px;margin-bottom:14px}
.dtab{padding:6px 13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:99px;color:rgba(255,255,255,.45);font-size:.78rem;cursor:pointer;transition:.2s}
.dtab.on{background:var(--y);color:var(--dk);border-color:var(--y);font-weight:700}

/* CONCLUDE CARD */
.concard{background:linear-gradient(135deg,var(--dk3),var(--dk2));border:2px solid rgba(255,224,0,.28);border-radius:14px;padding:24px;text-align:center;margin-bottom:18px}
.concard h3{font-family:Syne;font-size:1.2rem;margin-bottom:7px}
.concard p{color:rgba(255,255,255,.45);font-size:.85rem;margin-bottom:18px}
.daybadge{display:inline-block;background:var(--y);color:var(--dk);font-family:Syne;font-size:1rem;font-weight:800;padding:5px 18px;border-radius:99px;margin-bottom:16px}

/* SEARCH */
.sbar{display:flex;gap:9px;margin-bottom:14px}
.sbar input{flex:1}
.frow{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.frow select{flex:1;min-width:130px}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:rgba(255,255,255,.25)}
.empty .ei{font-size:2.2rem;margin-bottom:10px;opacity:.5}

/* UTILS */

<script>
// ══════════════════════════════
//  CONFIG — UPDATE THIS URL
// ══════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbzuYgcNQ3Qg5XytMxx76apORo0dos1eYNN-B1648PJ1ZcmBQh9RAhAY7Tz-MJiXBnMAIg/exec';

// ══════════════════════════════
//  STATE
// ══════════════════════════════
let SES = null;
let pollTimer = null;
let confirmFn = null;
let notifLog = [];
let dismissedAnn = null;
let cbN = 0;

// ══════════════════════════════
//  JSONP API — confirmed working
// ══════════════════════════════
function api(action, params, silent) {
  params = params || {};
  silent = silent || false;
  if (!silent) spin(true);
  return new Promise(function(resolve, reject) {
    var name = '_cb' + (++cbN);
    var payload = { action: action, params: params };
    if (SES && SES.token) payload.token = SES.token;
    var url = API + '?callback=' + name + '&data=' + encodeURIComponent(JSON.stringify(payload));
    var done = false;

    var t = setTimeout(function() {
      if (done) return; done = true;
      cleanup(); if (!silent) spin(false);
      reject(new Error('Timeout — check connection'));
    }, 30000);

    window[name] = function(r) {
      if (done) return; done = true;
      cleanup(); if (!silent) spin(false);
      if (r && r.success) resolve(r.data);
      else reject(new Error((r && r.error) || 'Server error'));
    };

    function cleanup() {
      clearTimeout(t); delete window[name];
      var el = document.getElementById(name);
      if (el) el.parentNode.removeChild(el);
    }

    var s = document.createElement('script');
    s.id = name; s.src = url;
    s.onerror = function() {
      if (done) return; done = true;
      cleanup(); if (!silent) spin(false);
      reject(new Error('Script error — check Apps Script URL'));
    };
    document.head.appendChild(s);
  });
}

// ══════════════════════════════
//  UI HELPERS
// ══════════════════════════════
function spin(on) { document.getElementById('spin').className = on ? 'on' : ''; }

function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast' + (type === 'err' ? ' err' : type === 'warn' ? ' warn' : '');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 4000);
}

var confirmResolve = null;
function confirm2(title, msg, dangerBtn) {
  document.getElementById('conf-title').textContent = title;
  document.getElementById('conf-msg').textContent = msg;
  var ok = document.getElementById('conf-ok');
  ok.className = 'btn ' + (dangerBtn ? 'btn-danger' : 'btn-y');
  ok.textContent = dangerBtn || 'Confirm';
  document.getElementById('confirm').className = 'on';
  return new Promise(function(res) { confirmResolve = res; });
}
function doConfirm() { document.getElementById('confirm').className = ''; if (confirmResolve) { confirmResolve(true); confirmResolve = null; } }
function closeConfirm() { document.getElementById('confirm').className = ''; if (confirmResolve) { confirmResolve(false); confirmResolve = null; } }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtT(iso) {
  if (!iso) return '—';
  try { var d = new Date(iso); return d.toLocaleDateString('en-PH',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return String(iso).slice(0,16); }
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('on'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('on'); });
  var btn = document.querySelector('[data-tab="'+id+'"]');
  var pan = document.getElementById(id);
  if (btn) btn.classList.add('on');
  if (pan) pan.classList.add('on');
}

// ══════════════════════════════
//  NOTIFICATIONS
// ══════════════════════════════
function toggleNotif() {
  var dd = document.getElementById('notif-dd');
  dd.classList.toggle('on');
  if (dd.classList.contains('on')) {
    document.getElementById('bell-badge').classList.remove('on');
    renderNotifs();
  }
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.bell-wrap')) document.getElementById('notif-dd').classList.remove('on');
});
function renderNotifs() {
  var el = document.getElementById('notif-list');
  if (!notifLog.length) { el.innerHTML = '<div class="ndd-empty">No notifications yet</div>'; return; }
  el.innerHTML = notifLog.slice(0,12).map(function(n) {
    return '<div class="ndd-item">'+esc(n.message)+'<div class="ndd-time">'+fmtT(n.created_at)+'</div></div>';
  }).join('');
}
function dismissAnn() {
  dismissedAnn = document.getElementById('ann-txt').textContent;
  document.getElementById('ann').classList.remove('on');
}

// ══════════════════════════════
//  POLLING
// ══════════════════════════════
async function poll() {
  try {
    var notifs = await api('pollNotifications', {}, true);
    if (notifs && notifs.length) {
      notifs.forEach(function(n) { notifLog.unshift(n); toast('🔔 ' + n.message); });
      document.getElementById('bell-badge').textContent = notifLog.length > 9 ? '9+' : notifLog.length;
      document.getElementById('bell-badge').classList.add('on');
    }
    var ann = await api('getAnnouncement', {}, true);
    var annEl = document.getElementById('ann');
    if (ann && ann.message !== dismissedAnn) {
      document.getElementById('ann-txt').textContent = ann.message;
      annEl.classList.add('on');
    } else if (!ann) {
      annEl.classList.remove('on');
    }
  } catch(e) {}
}

// ══════════════════════════════
//  AUTH
// ══════════════════════════════
document.getElementById('lp').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  var u = document.getElementById('lu').value.trim();
  var p = document.getElementById('lp').value;
  var err = document.getElementById('lerr');
  err.style.display = 'none';
  if (!u || !p) { err.textContent = 'Enter username and password.'; err.style.display = 'block'; return; }
  try {
    var data = await api('login', { username: u, password: p });
    SES = data;
    localStorage.setItem('sf_ses', JSON.stringify(data));
    if (data.must_change_pw) {
      document.getElementById('pwmodal').classList.add('on');
    } else {
      enterApp();
    }
  } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
}

async function submitPw() {
  var p1 = document.getElementById('pw1').value;
  var p2 = document.getElementById('pw2').value;
  if (!p1 || p1.length < 6) { toast('Min 6 characters', 'warn'); return; }
  if (p1 !== p2) { toast('Passwords do not match', 'warn'); return; }
  try {
    await api('changePassword', { newPassword: p1 });
    document.getElementById('pwmodal').classList.remove('on');
    toast('Password saved!'); enterApp();
  } catch(e) { toast(e.message, 'err'); }
}

async function doLogout() {
  try { await api('logout', {}, true); } catch(e) {}
  localStorage.removeItem('sf_ses');
  SES = null; clearInterval(pollTimer);
  document.getElementById('app').classList.remove('on');
  document.getElementById('login').style.display = 'flex';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
}

function enterApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('on');
  var ini = (SES.full_name||'?').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  document.getElementById('nav-av').textContent = ini;
  document.getElementById('nav-name').textContent = SES.full_name;
  var rb = document.getElementById('nav-rbadge');
  rb.textContent = SES.role.charAt(0).toUpperCase() + SES.role.slice(1);
  rb.className = 'rbadge rb-' + SES.role;
  var ui = document.getElementById('role-ui');
  if (SES.role === 'learner') ui.innerHTML = buildLearner();
  else if (SES.role === 'admin') ui.innerHTML = buildAdmin();
  else if (SES.role === 'teacher') ui.innerHTML = buildTeacher();
  else if (SES.role === 'booth') ui.innerHTML = buildBooth();
  switchTab(SES.role + '0');
  loadInitial();
  pollTimer = setInterval(poll, 5000);
  poll();
}

// ══════════════════════════════
//  BUILD UIs
// ══════════════════════════════
function mkTabs(names, role) {
  return '<div class="tabs">' + names.map(function(n,i){return '<button class="tab" data-tab="'+role+i+'" onclick="switchTab(\''+role+i+'\')">'+n+'</button>';}).join('') + '</div>' +
    names.map(function(_,i){return '<div class="panel" id="'+role+i+'"></div>';}).join('');
}

function buildLearner() { return mkTabs(['Dashboard','Play Booth','Send Ticket','My Points','FAQs','Credits'],'learner'); }
function buildAdmin()   { return mkTabs(['Deploy','Disbursement','Transactions','Accounts','Booth Points','Register Booth','Announcements','FAQs','Credits','Audit Log'],'admin'); }
function buildTeacher() { return mkTabs(['Student Points','FAQs','Credits'],'teacher'); }
function buildBooth()   { return mkTabs(['Dashboard','Leaderboard','FAQs','Credits'],'booth'); }

// ══════════════════════════════
//  LOAD INITIAL DATA
// ══════════════════════════════
async function loadInitial() {
  var r = SES.role;
  if (r === 'learner') { await loadLearnerDash(); }
  else if (r === 'admin') { await loadAdminDeploy(); }
  else if (r === 'teacher') { await loadTeacherPanel(); }
  else if (r === 'booth') { await loadBoothDash(); }
  loadFAQs(); loadCredits();
}

// ══════════════════════════════
//  LEARNER
// ══════════════════════════════
async function loadLearnerDash() {
  try {
    var d = await api('getDashboard');
    SES.ticket_balance = d.ticket_balance;
    document.getElementById('learner0').innerHTML =
      '<div class="greet"><h2>Hey, <span>'+esc(d.full_name.split(' ')[0])+'</span>! 👋</h2><p>Welcome to the Science Fair Booth System</p><span class="gtag">📚 '+esc(d.grade_section)+'</span></div>' +
      '<div class="stat-grid">' +
        '<div class="stat card-y"><div class="stat-label">Ticket Balance</div><div class="stat-val" id="bal-disp">'+d.ticket_balance+'</div><div class="stat-sub">Available tickets</div></div>' +
        '<div class="stat"><div class="stat-label">Transactions</div><div class="stat-val" style="color:var(--g2)">'+d.activity_log.length+'</div><div class="stat-sub">Total activities</div></div>' +
      '</div>' +
      '<div class="stitle"><span class="sicon">📋</span>Recent Activity</div>' +
      '<div class="acts">'+renderActs(d.activity_log, d.account_id)+'</div>';
    await loadBoothsPanel();
    await loadSendPanel();
    await loadMyPoints();
  } catch(e) { toast(e.message,'err'); }
}

function renderActs(log, myId) {
  if (!log.length) return '<div class="empty"><div class="ei">📭</div><p>No activity yet</p></div>';
  return log.map(function(t) {
    var isFrom = String(t.from_account_id) === String(myId);
    var dotCls = {play_booth:'adot-play',send_student:'adot-send',deploy:'adot-dep',refund:'adot-ref'}[t.txn_type] || 'adot-dep';
    var label = {play_booth: isFrom?'Played at a booth':'Received play', send_student: isFrom?'Sent ticket to student':'Received ticket from student', deploy:'Received from Admin', refund:'Refund processed'}[t.txn_type] || t.txn_type;
    var sign = (t.txn_type==='deploy'||(!isFrom&&t.txn_type==='send_student')||t.txn_type==='refund') ? '+' : '-';
    var ref = (t.refunded===true||t.refunded==='TRUE');
    return '<div class="act'+(ref?' refunded-row':'')+'"><div class="adot '+dotCls+'"></div><div class="act-txt">'+label+(ref?' (refunded)':'')+'<div class="act-sub">Day '+t.day+' · '+fmtT(t.timestamp)+'</div></div><div class="act-tk">'+sign+t.tickets+'</div></div>';
  }).join('');
}

var selBoothId = null, selBoothName = null, playTk = 1, sendTk = 1;
var boothsCache = [];

async function loadBoothsPanel() {
  try {
    var bs = await api('getBooths', {}, true);
    boothsCache = bs;
    var ICONS = ['🔬','🧪','🌱','⚡','🎯','🧲','💡','🚀','🎨','🌊','🌡','🔭'];
    document.getElementById('learner1').innerHTML =
      '<div class="stitle"><span class="sicon">🎮</span>Choose a Booth</div>' +
      '<div class="bgrid" id="bgrid">'+bs.map(function(b,i){return '<div class="bcrd" id="bc-'+b.booth_id+'" onclick="selBooth(\''+esc(b.booth_id)+'\',\''+esc(b.booth_name)+'\')"><div class="bico">'+ICONS[i%ICONS.length]+'</div><div class="bname">'+esc(b.booth_name)+'</div></div>';}).join('')+'</div>' +
      '<div class="tpick hidden" id="play-pick"><h4>🎟 Playing at: <span id="sel-bn">—</span></h4><div class="trow"><button class="tcnt" onclick="adjPlay(-1)">−</button><div class="tnum" id="play-n">1</div><button class="tcnt" onclick="adjPlay(1)">+</button><span class="muted" style="margin-left:6px">tickets</span></div><div style="display:flex;gap:9px;margin-top:13px"><button class="btn btn-y" onclick="confPlay()">Send Tickets →</button><button class="btn btn-ghost" onclick="clearSel()">Cancel</button></div></div>' +
      '<div class="muted mt8">Balance: <span class="ty" id="bal-play">'+SES.ticket_balance+'</span> tickets</div>';
  } catch(e) {}
}

function selBooth(id, name) {
  selBoothId = id; selBoothName = name;
  document.querySelectorAll('.bcrd').forEach(function(c){c.classList.remove('sel');});
  document.getElementById('bc-'+id).classList.add('sel');
  document.getElementById('sel-bn').textContent = name;
  document.getElementById('play-pick').classList.remove('hidden');
  playTk = 1; document.getElementById('play-n').textContent = 1;
}
function clearSel() {
  selBoothId = null;
  document.querySelectorAll('.bcrd').forEach(function(c){c.classList.remove('sel');});
  document.getElementById('play-pick').classList.add('hidden');
}
function adjPlay(d) { playTk = Math.max(1, playTk+d); document.getElementById('play-n').textContent = playTk; }
function adjSend(d) { sendTk = Math.max(1, sendTk+d); document.getElementById('send-n').textContent = sendTk; }

async function confPlay() {
  if (!selBoothId) { toast('Select a booth first','warn'); return; }
  var ok = await confirm2('Confirm Play', 'Send '+playTk+' ticket'+(playTk>1?'s':'')+' to "'+selBoothName+'"?');
  if (!ok) return;
  try {
    var r = await api('playBooth', { boothId: selBoothId, tickets: playTk });
    SES.ticket_balance = r.new_balance;
    updateBal(r.new_balance);
    toast('🎮 '+r.message);
    clearSel();
    await loadLearnerDash();
  } catch(e) { toast(e.message,'err'); }
}

async function loadSendPanel() {
  try {
    var secs = await api('getSectionList', {}, true);
    document.getElementById('learner2').innerHTML =
      '<div class="stitle"><span class="sicon">📨</span>Send a Ticket</div>' +
      '<div class="card"><div class="fg"><label>Filter by Section</label><select class="inp" id="send-sec" onchange="loadSendStudents()"><option value="">All Sections</option>'+secs.map(function(s){return '<option value="'+esc(s)+'">'+esc(s)+'</option>';}).join('')+'</select></div>' +
      '<div class="fg"><label>Recipient</label><select class="inp" id="send-recip"><option value="">Select student...</option></select></div>' +
      '<div class="fg"><label>Tickets</label><div class="trow"><button class="tcnt" onclick="adjSend(-1)">−</button><div class="tnum" id="send-n">1</div><button class="tcnt" onclick="adjSend(1)">+</button></div></div>' +
      '<div class="muted mt8 mb14">Balance: <span class="ty">'+SES.ticket_balance+'</span> tickets</div>' +
      '<button class="btn btn-y" onclick="confSend()">Send Tickets →</button></div>';
    await loadSendStudents();
  } catch(e) {}
}

async function loadSendStudents() {
  var sec = document.getElementById('send-sec') ? document.getElementById('send-sec').value : '';
  try {
    var st = await api('getLearnerList', { section: sec }, true);
    var sel = document.getElementById('send-recip');
    if (!sel) return;
    sel.innerHTML = '<option value="">Select student...</option>' + st.map(function(s){return '<option value="'+esc(s.account_id)+'">'+esc(s.full_name)+' — '+esc(s.grade_section)+'</option>';}).join('');
  } catch(e) {}
}

async function confSend() {
  var toId = document.getElementById('send-recip').value;
  var toName = document.getElementById('send-recip').selectedOptions[0] ? document.getElementById('send-recip').selectedOptions[0].text : '';
  if (!toId) { toast('Select a recipient','warn'); return; }
  var ok = await confirm2('Confirm Send', 'Send '+sendTk+' ticket'+(sendTk>1?'s':'')+' to '+toName+'?');
  if (!ok) return;
  try {
    var r = await api('sendTicket', { toAccountId: toId, tickets: sendTk });
    SES.ticket_balance = r.new_balance;
    updateBal(r.new_balance);
    toast('📨 '+r.message);
    await loadLearnerDash();
  } catch(e) { toast(e.message,'err'); }
}

function updateBal(n) {
  ['bal-disp','bal-play'].forEach(function(id){ var el=document.getElementById(id); if(el)el.textContent=n; });
}

async function loadMyPoints() {
  try {
    var d = await api('getMyBoothPoints', {}, true);
    document.getElementById('learner3').innerHTML =
      '<div class="stitle"><span class="sicon">⭐</span>My Ticket Points</div>' +
      '<div class="card"><div style="margin-bottom:14px"><div class="muted">Total Points Spent on Booths</div><div style="font-family:Syne;font-size:2.2rem;font-weight:800;color:var(--y)">'+d.total+'</div></div>' +
      '<div class="tbl-wrap"><table><thead><tr><th>Booth</th><th>Tickets Played</th></tr></thead><tbody>' +
      (d.per_booth.length ? d.per_booth.map(function(b){return '<tr><td>'+esc(b.booth_name)+'</td><td class="ty">'+b.points+'</td></tr>';}).join('') + '<tr><td><strong>Total</strong></td><td><strong class="ty">'+d.total+'</strong></td></tr>' : '<tr><td colspan="2"><div class="empty"><p>No booth plays yet</p></div></td></tr>') +
      '</tbody></table></div></div>';
  } catch(e) {}
}

// ══════════════════════════════
//  ADMIN
// ══════════════════════════════
async function onAdminTab(i) {
  if(i===0) await loadAdminDeploy();
  else if(i===1) await loadDisbursement();
  else if(i===2) await loadAllTxns();
  else if(i===3) await loadAccounts();
  else if(i===4) await loadBoothPts();
  else if(i===5) await loadRegBooth();
  else if(i===6) await loadAnnPanel();
  else if(i===7) loadFAQs(true);
  else if(i===8) loadCredits(true);
  else if(i===9) await loadAuditLog();
}

// Attach tab handlers for admin
document.addEventListener('click', function(e) {
  if (SES && SES.role === 'admin') {
    var btn = e.target.closest('.tab');
    if (btn) {
      var tid = btn.getAttribute('data-tab');
      if (tid && tid.startsWith('admin')) {
        var i = parseInt(tid.replace('admin',''));
        onAdminTab(i);
      }
    }
  }
});

var adTk = 10;
async function loadAdminDeploy() {

      (adminEdit ? '<div class="card mb14"><div class="fg"><label>Question</label><input class="inp" id="faq-q" placeholder="Enter question"></div><div class="fg"><label>Answer</label><textarea class="inp" id="faq-a" rows="3" placeholder="Enter answer"></textarea></div><button class="btn btn-y btn-sm" onclick="addFAQ()">+ Add FAQ</button></div>' : '') +
      '<div class="faq-list">'+(faqs.length?faqs.map(function(f){return '<div class="faq-item" onclick="this.classList.toggle(\'on\')"><div class="faq-q">'+esc(f.question)+'<span class="faq-arr">▼</span></div><div class="faq-a">'+esc(f.answer)+(adminEdit?'<div style="margin-top:9px"><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();delFAQ(\''+esc(f.faq_id)+'\')">Delete</button></div>':'')+'</div></div>';}).join(''):'<div class="empty"><div class="ei">❓</div><p>No FAQs yet</p></div>')+'</div>';
  } catch(e) {}
}
async function addFAQ(){ var q=(document.getElementById('faq-q')||{}).value||'',a=(document.getElementById('faq-a')||{}).value||'';if(!q||!a){toast('Enter Q and A','warn');return;}try{await api('manageFAQ',{subaction:'add',data:{question:q,answer:a}});toast('FAQ added.');loadFAQs(true);}catch(e){toast(e.message,'err');} }
async function delFAQ(id){var ok=await confirm2('Delete FAQ','Remove this FAQ?','Delete');if(!ok)return;try{await api('manageFAQ',{subaction:'delete',data:{faq_id:id}});toast('Removed.');loadFAQs(true);}catch(e){toast(e.message,'err');}}

async function loadCredits(adminEdit) {
  var ids = { learner:'learner5', admin:'admin8', teacher:'teacher2', booth:'booth3' };
  var pan = document.getElementById(ids[SES.role]);
  if (!pan) return;
  try {
    var grouped = await api('getCredits', {}, true);
    var cats = Object.keys(grouped);
    pan.innerHTML = '<div class="stitle"><span class="sicon">⭐</span>Credits</div>' +
      (adminEdit ? '<div class="card mb14"><div class="g2col"><div class="fg"><label>Name</label><input class="inp" id="cr-n" placeholder="Full name"></div><div class="fg"><label>Role</label><input class="inp" id="cr-r" placeholder="e.g. Lead Developer"></div><div class="fg" style="grid-column:1/-1"><label>Category</label><input class="inp" id="cr-c" placeholder="e.g. Developers"></div></div><button class="btn btn-y btn-sm" onclick="addCredit()">+ Add</button></div>' : '') +
      (cats.length ? cats.map(function(cat){return '<div class="cr-sec"><h3>'+esc(cat)+'</h3><div class="cr-grid">'+grouped[cat].map(function(c){return '<div class="cr-card"><div class="cr-name">'+esc(c.name)+'</div><div class="cr-role">'+esc(c.role_label)+'</div></div>';}).join('')+'</div></div>';}).join('') : '<div class="empty"><div class="ei">⭐</div><p>No credits yet</p></div>');
  } catch(e) {}
}
async function addCredit(){ var n=(document.getElementById('cr-n')||{}).value||'',r=(document.getElementById('cr-r')||{}).value||'',c=(document.getElementById('cr-c')||{}).value||'';if(!n||!r||!c){toast('All fields required','warn');return;}try{await api('manageCredits',{subaction:'add',data:{name:n,role_label:r,category:c}});toast('Added.');loadCredits(true);}catch(e){toast(e.message,'err');} }

// ══════════════════════════════
//  AUTO-LOGIN
// ══════════════════════════════
(async function() {
  var saved = localStorage.getItem('sf_ses');
  if (!saved) return;
  try {
    SES = JSON.parse(saved);
    var valid = await api('validateSession', {}, true);
    if (valid) { SES = Object.assign({}, SES, valid); enterApp(); }
    else { localStorage.removeItem('sf_ses'); SES = null; }
  } catch(e) { localStorage.removeItem('sf_ses'); SES = null; }
})();
</script>
